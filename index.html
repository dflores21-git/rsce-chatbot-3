<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente RSCE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

#chat-wrapper {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
}

/* ── FILA INFERIOR: pill + botón ─────────────────────────────────────────── */
#bottom-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── BURBUJA PILL ─────────────────────────────────────────────────────────── */
#bubble-pill {
  display: flex;
  align-items: center;
  cursor: pointer;
  opacity: 0;
  transform: translateX(12px);
  transition: opacity 0.35s ease, transform 0.35s ease;
  pointer-events: none;
  position: relative;
}
#bubble-pill.visible {
  opacity: 1;
  transform: translateX(0);
  pointer-events: all;
}
#bubble-pill.dismissed {
  opacity: 0;
  transform: translateX(12px);
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

#bubble-label {
  background: #1a3a5c;
  color: white;
  font-size: 13.5px;
  font-weight: 500;
  padding: 12px 18px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  box-shadow: 0 4px 18px rgba(0,0,0,0.22);
}

#bubble-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4cd964;
  flex-shrink: 0;
}

#bubble-pill-typing {
  display: flex;
  gap: 4px;
  align-items: center;
  height: 16px;
}
#bubble-pill-typing span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: white;
  animation: typing 1.2s infinite;
}
#bubble-pill-typing span:nth-child(2) { animation-delay: 0.18s; }
#bubble-pill-typing span:nth-child(3) { animation-delay: 0.36s; }
#bubble-pill-text { display: none; }

/* ── BOTÓN FLOTANTE ───────────────────────────────────────────────────────── */
#chat-toggle-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: none;
  border: 3px solid #c9a84c;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: transform 0.2s;
  flex-shrink: 0;
  position: relative;
  padding: 0;
  overflow: hidden;
}
#chat-toggle-btn:hover { transform: scale(1.08); }

#notification-dot {
  position: absolute;
  top: 0; right: 0;
  width: 14px; height: 14px;
  background: #c9a84c;
  border-radius: 50%;
  border: 2px solid white;
  display: none;
}

/* ── CHATBOT ──────────────────────────────────────────────────────────────── */
#chatbot-container {
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  width: 370px;
  height: 500px;
  overflow: hidden;
  transform-origin: bottom right;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
#chatbot-container.hidden {
  transform: scale(0.85);
  opacity: 0;
  pointer-events: none;
}

#chat-header {
  background: #1a3a5c;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#chat-header .info { flex: 1; }
#chat-header .info h3 { color: white; font-size: 14px; font-weight: 600; }
#chat-header .info span { color: #c9a84c; font-size: 11px; }

#close-btn {
  background: none; border: none;
  color: white; font-size: 20px;
  cursor: pointer; opacity: 0.7;
}
#close-btn:hover { opacity: 1; }

/* ── IFRAME del webchat ───────────────────────────────────────────────────── */
#copilot-iframe {
  flex: 1;
  border: none;
  width: 100%;
}

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30%            { opacity: 1;   transform: translateY(-5px); }
}
</style>
</head>
<body>

<div id="chat-wrapper">

  <!-- Chat abierto -->
  <div id="chatbot-container" class="hidden">
    <div id="chat-header">
      <img src="https://rsce-chatbot-production-9d34.up.railway.app/Intelligent-Dog-Breeds.jpg"
           alt="RSCE" style="width:40px;height:40px;object-fit:cover;border-radius:50%;border:2px solid #c9a84c;">
      <div class="info">
        <h3>Asistente RSCE</h3>
        <span>En línea</span>
      </div>
      <button id="close-btn" onclick="toggleChat()">✕</button>
    </div>

    <!-- Webchat de Copilot Studio directamente -->
    <iframe
      id="copilot-iframe"
      src="https://copilotstudio.microsoft.com/environments/Default-e92af6be-adc7-48a1-965e-60e102a5f05d/bots/cref3_asistenteRsce3MZRN1/webchat?__version__=2"
      allow="microphone;">
    </iframe>
  </div>

  <!-- Fila inferior: pill a la izquierda, botón a la derecha -->
  <div id="bottom-row">

    <!-- Pill -->
    <div id="bubble-pill" onclick="openFromBubble()">
      <div id="bubble-label">
        <div id="bubble-pill-typing">
          <span></span><span></span><span></span>
        </div>
        <span id="bubble-pill-text">¿Necesitas ayuda?</span>
      </div>
    </div>

    <!-- Botón flotante -->
    <button id="chat-toggle-btn" onclick="toggleChat()" title="Abrir asistente RSCE">
      <img src="https://rsce-chatbot-production-9d34.up.railway.app/Intelligent-Dog-Breeds.jpg"
           alt="RSCE" style="width:56px;height:56px;object-fit:cover;border-radius:50%;">
      <div id="notification-dot"></div>
    </button>

  </div>
</div>

<script>
  let isOpen  = false;

  const bubblePill = document.getElementById('bubble-pill');
  const pillTyping = document.getElementById('bubble-pill-typing');
  const pillText   = document.getElementById('bubble-pill-text');

  // 1s → aparece con typing; 2s después → muestra texto
  setTimeout(() => {
    bubblePill.classList.add('visible');
    setTimeout(() => {
      pillTyping.style.display = 'none';
      pillText.style.display   = 'inline';
    }, 2000);
  }, 1000);

  function dismissBubble(e) {
    if (e && e.stopPropagation) e.stopPropagation();
    bubblePill.classList.add('dismissed');
    setTimeout(() => { bubblePill.style.display = 'none'; }, 250);
  }

  function openFromBubble() {
    dismissBubble(null);
    if (!isOpen) toggleChat();
  }

  function toggleChat() {
    isOpen = !isOpen;
    const container = document.getElementById('chatbot-container');
    if (isOpen) {
      dismissBubble(null);
      container.classList.remove('hidden');
      document.getElementById('notification-dot').style.display = 'none';
    } else {
      container.classList.add('hidden');
    }
  }
</script>
</body>
</html>
