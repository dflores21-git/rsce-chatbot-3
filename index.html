<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente RSCE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

#chat-wrapper {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
}

#bottom-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

#bubble-pill {
  display: flex;
  align-items: center;
  cursor: pointer;
  opacity: 0;
  transform: translateX(12px);
  transition: opacity 0.35s ease, transform 0.35s ease;
  pointer-events: none;
}
#bubble-pill.visible { opacity: 1; transform: translateX(0); pointer-events: all; }
#bubble-pill.dismissed {
  opacity: 0; transform: translateX(12px); pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

#bubble-label {
  background: #1a3a5c;
  color: white;
  font-size: 13.5px;
  font-weight: 500;
  padding: 12px 18px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  box-shadow: 0 4px 18px rgba(0,0,0,0.22);
}

#bubble-pill-typing { display: flex; gap: 4px; align-items: center; height: 16px; }
#bubble-pill-typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: white; animation: typing 1.2s infinite;
}
#bubble-pill-typing span:nth-child(2) { animation-delay: 0.18s; }
#bubble-pill-typing span:nth-child(3) { animation-delay: 0.36s; }
#bubble-pill-text { display: none; }

#chat-toggle-btn {
  width: 56px; height: 56px; border-radius: 50%;
  background: none; border: 3px solid #c9a84c;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: transform 0.2s; flex-shrink: 0;
  position: relative; padding: 0; overflow: hidden;
}
#chat-toggle-btn:hover { transform: scale(1.08); }

#notification-dot {
  position: absolute; top: 0; right: 0;
  width: 14px; height: 14px; background: #c9a84c;
  border-radius: 50%; border: 2px solid white; display: none;
}

#chatbot-container {
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  width: 370px;
  height: 520px;
  overflow: hidden;
  transform-origin: bottom right;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
#chatbot-container.hidden {
  transform: scale(0.85); opacity: 0; pointer-events: none;
}

#chat-header {
  background: #1a3a5c;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#chat-header .info { flex: 1; }
#chat-header .info h3 { color: white; font-size: 14px; font-weight: 600; }
#chat-header .info span { color: #c9a84c; font-size: 11px; }

#close-btn {
  background: none; border: none; color: white;
  font-size: 20px; cursor: pointer; opacity: 0.7;
}
#close-btn:hover { opacity: 1; }

/* Webchat container */
#webchat {
  flex: 1;
  overflow: hidden;
}

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30%            { opacity: 1;   transform: translateY(-5px); }
}
</style>
</head>
<body>

<div id="chat-wrapper">

  <div id="chatbot-container" class="hidden">
    <div id="chat-header">
      <img src="https://rsce-chatbot-production-9d34.up.railway.app/Intelligent-Dog-Breeds.jpg"
           alt="RSCE" style="width:40px;height:40px;object-fit:cover;border-radius:50%;border:2px solid #c9a84c;">
      <div class="info">
        <h3>Asistente RSCE</h3>
        <span>En línea</span>
      </div>
      <button id="close-btn" onclick="toggleChat()">✕</button>
    </div>
    <div id="webchat"></div>
  </div>

  <div id="bottom-row">
    <div id="bubble-pill" onclick="openFromBubble()">
      <div id="bubble-label">
        <div id="bubble-pill-typing">
          <span></span><span></span><span></span>
        </div>
        <span id="bubble-pill-text">¿Necesitas ayuda?</span>
      </div>
    </div>

    <button id="chat-toggle-btn" onclick="toggleChat()" title="Abrir asistente RSCE">
      <img src="https://rsce-chatbot-production-9d34.up.railway.app/Intelligent-Dog-Breeds.jpg"
           alt="RSCE" style="width:56px;height:56px;object-fit:cover;border-radius:50%;">
      <div id="notification-dot"></div>
    </button>
  </div>
</div>

<!-- Bot Framework Webchat SDK -->
<script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>

<script>
  let isOpen      = false;
  let webchatInit = false;

  const bubblePill = document.getElementById('bubble-pill');
  const pillTyping = document.getElementById('bubble-pill-typing');
  const pillText   = document.getElementById('bubble-pill-text');

  setTimeout(() => {
    bubblePill.classList.add('visible');
    setTimeout(() => {
      pillTyping.style.display = 'none';
      pillText.style.display   = 'inline';
    }, 2000);
  }, 1000);

  function dismissBubble(e) {
    if (e && e.stopPropagation) e.stopPropagation();
    bubblePill.classList.add('dismissed');
    setTimeout(() => { bubblePill.style.display = 'none'; }, 250);
  }

  function openFromBubble() {
    dismissBubble(null);
    if (!isOpen) toggleChat();
  }

  async function initWebchat() {
    if (webchatInit) return;
    webchatInit = true;

    // Obtener token Direct Line desde el endpoint de Copilot Studio
    const tokenEndpoint = 'https://defaulte92af6beadc748a1965e60e102a5f0.5d.environment.api.powerplatform.com/copilotstudio/dataverse-backed/unauthenticated/bots/cref3_asistenteRsce3MZRN1/directline/token?api-version=2022-03-01-preview';

    let directLineToken;
    try {
      const res  = await fetch(tokenEndpoint, { method: 'POST' });
      const data = await res.json();
      directLineToken = data.token;
    } catch (e) {
      console.error('Error obteniendo token Direct Line:', e);
      return;
    }

    // Paleta de colores RSCE
    const styleOptions = {
      // Fondo del chat
      backgroundColor: '#f4f6f8',

      // Burbujas del bot
      bubbleBackground:          '#ffffff',
      bubbleBorderColor:         '#dde2e8',
      bubbleBorderRadius:        8,
      bubbleTextColor:           '#1a1a1a',

      // Burbujas del usuario
      bubbleFromUserBackground:  '#1a3a5c',
      bubbleFromUserBorderColor: '#1a3a5c',
      bubbleFromUserBorderRadius: 8,
      bubbleFromUserTextColor:   '#ffffff',

      // Input
      sendBoxBackground:         '#ffffff',
      sendBoxBorderBottom:       '2px solid #c9a84c',
      sendBoxBorderLeft:         'none',
      sendBoxBorderRight:        'none',
      sendBoxBorderTop:          '1px solid #e0e0e0',
      sendBoxTextColor:          '#333',
      sendBoxPlaceholderColor:   '#aaa',

      // Botón enviar
      sendBoxButtonColor:        '#1a3a5c',
      sendBoxButtonColorOnFocus: '#c9a84c',
      sendBoxButtonColorOnHover: '#c9a84c',

      // Timestamps y texto secundario
      timestampColor:            '#999',

      // Ocultar avatar del bot (ya tenemos nuestro header)
      botAvatarInitials:         '',
      botAvatarImage:            'https://rsce-chatbot-production-9d34.up.railway.app/Intelligent-Dog-Breeds.jpg',
      botAvatarBackgroundColor:  '#1a3a5c',

      // Sugerencias (follow-ups)
      suggestedActionBackground:         '#ffffff',
      suggestedActionBorderColor:        '#c9a84c',
      suggestedActionTextColor:          '#1a3a5c',
      suggestedActionBackgroundColorOnHover: '#1a3a5c',
      suggestedActionTextColorOnHover:       '#ffffff',
      suggestedActionBorderRadius:       16,

      // Scroll
      scrollBarWidth:            4,

      // Tamaño de fuente
      primaryFont:               "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif",
      bubbleFontSize:            13,
    };

    window.WebChat.renderWebChat(
      {
        directLine: window.WebChat.createDirectLine({ token: directLineToken }),
        styleOptions,
        locale: 'es-ES',
        userID:   'rsce-user-' + Math.random().toString(36).slice(2),
        username: 'Usuario',
      },
      document.getElementById('webchat')
    );
  }

  function toggleChat() {
    isOpen = !isOpen;
    const container = document.getElementById('chatbot-container');
    if (isOpen) {
      dismissBubble(null);
      container.classList.remove('hidden');
      document.getElementById('notification-dot').style.display = 'none';
      initWebchat();
    } else {
      container.classList.add('hidden');
    }
  }
</script>
</body>
</html>
